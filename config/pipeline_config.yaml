workflow:
  mode: stac_trainlike_composite

stac:
  url: http://10.0.1.79:8081
  collection: sentinel-1-grd
  datetime: null
  limit: 300

compatibility:
  trained_input_profile: gee_s1_db
  current_download_profile: stac_trainlike_composite_db
  allow_domain_mismatch: false

pairing:
  pols: VV,VH
  orbit: null
  rel_orbit: null
  min_overlap: 0.0
  min_aoi_coverage: 1.0
  min_delta_hours: 24.0
  max_delta_days: 10
  same_orbit_direction: false
  strict_slice: false
  auto_relax: false

trainlike:
  window_before_days: 30
  window_after_days: 30
  min_scenes_per_window: 1
  auto_relax_min_scenes: true
  anchor_pick_index: 1
  same_orbit_direction: false
  anchor_min_delta_hours: 24.0
  target_crs: EPSG:3857
  target_resolution: 10.0
  resampling: bilinear
  focal_median_radius_m: 15.0
  window_raw_dir_name: window_raw
  composite_dir_name: composite

download:
  t1_prefix: s1t1_
  t2_prefix: s1t2_
  full_item: false
  raw_dir_name: raw

staging:
  cache_aligned_inputs: true
  dir_name: staging
  resampling: bilinear
  target_crs: null
  target_resolution: null

inference:
  config_path: config/infer_config.yaml

output:
  root_dir: runs/pipeline
  output_dir_name: output

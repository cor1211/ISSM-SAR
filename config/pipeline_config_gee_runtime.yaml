workflow:
  mode: gee_trainlike_composite

stac:
  url: null
  collection: sentinel-1-grd
  datetime: null
  limit: 300

gee:
  project: null
  collection: COPERNICUS/S1_GRD
  datetime: null
  authenticate: false
  band_names:
    - VV
    - VH
  output_band_descriptions:
    - S1_VV
    - S1_VH

compatibility:
  trained_input_profile: gee_s1_db
  current_download_profile: gee_s1_db
  allow_domain_mismatch: false

pairing:
  pols: VV,VH
  orbit: null
  rel_orbit: null
  min_overlap: 0.0
  min_aoi_coverage: 0.0
  min_delta_hours: 24.0
  max_delta_days: 10
  same_orbit_direction: false
  strict_slice: false
  auto_relax: false

trainlike:
  selection_strategy: representative_calendar_period
  period_mode: month
  period_boundary_policy: clip_inside_period
  period_split_policy: first_half_vs_second_half
  auto_datetime_strategy: previous_full_month
  auto_datetime_months_back: 1
  auto_datetime_timezone: Asia/Ho_Chi_Minh
  allow_partial_periods: false
  min_scenes_per_half: 1
  auto_relax_inside_period: true
  representative_pool_mode: mixed
  componentize_seed_intersections: true
  component_parent_mosaic: true
  component_item_min_coverage: 1.0
  component_min_area_ratio: 0.0
  window_before_days: 30
  window_after_days: 30
  min_scenes_per_window: 1
  auto_relax_min_scenes: true
  anchor_pick_index: 1
  same_orbit_direction: false
  anchor_min_delta_hours: 24.0
  orbit_pass: BOTH
  clip_mode: geometry
  target_crs: EPSG:3857
  target_resolution: 10.0
  resampling: bilinear
  focal_median_radius_m: 15.0
  window_raw_dir_name: window_raw
  composite_dir_name: composite

download:
  t1_prefix: s1t1_
  t2_prefix: s1t2_
  full_item: false
  raw_dir_name: raw

staging:
  cache_aligned_inputs: true
  dir_name: staging
  resampling: bilinear
  target_crs: null
  target_resolution: null

inference:
  config_path: config/infer_config.yaml

output:
  root_dir: runs
  output_dir_name: output
  save_debug_artifacts: false
  final_target_crs: EPSG:4326
  final_target_resolution: null
  final_resampling: bilinear

logging:
  level: INFO
  redact_secrets: true
  startup_env_checks: true
